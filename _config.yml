# Site
name: 'Damla Okul'
language: "tr"
description: 'Damla Okul — Damla Yayınevi okul yayınları ve eğitim materyalleri'
url: 'https://damlaokul.com'
logo: 'assets/images/logo.png'
favicon: 'assets/images/favicon/favicon.ico'
baseurl: ''

# Social Settings
google_analytics: 'G-KFMVQ3WNN3'
katalogurl: 'https://cdn.e-damla.com.tr/PUBLIC/Kataloglar/foreign-rights-catalogue-2022/index.html'
x: 'https://x.com/damlayayinevi'
facebook: 'https://www.facebook.com/damlayayinevi'
instagram: 'https://instagram.com/damlayayinevi'
youtube: 'https://www.youtube.com/@DamlaYay%C4%B1nGrubu'
website: 'https://damlayayinevi.com'

# Contact (site-wide)
contact_phone: "+90 212 514 28 28"
contact_phone_href: "tel:+902125142828"
contact_email: "iletisim@damlayayinevi.com.tr"
contact_address: "Alemdar Mh. Prof. Kazım İsmail Gürkan Cad. No:8 Fatih, 34110 İstanbul"

# behold.so instagram carousel
instagram_carousel:
  username: okul.damla
  profile_url: https://instagram.com/okul.damla
  feed_url: 'https://feeds.behold.so/k4ylFSaGtUBY15ZsyXAt'
  limit: 12

pagepreview:
  enabled: false
  prefix: 'https://cdn.e-damla.com.tr/PUBLIC/ornek-sayfalar/'
  postfix: '/index.html'

examlink:
  enabled: true
  prefix: 'https://cdn.e-damla.com.tr/PUBLIC/hds_pdf/'
  postfix: '/.pdf'

include: ["_pages"]
permalink: /:title/


# BuyOut Ecommerce websites:
buyout:
  enabled: false
  damlayayinevi: true
  hepsiburada: true
  dnr: true
  idefix: true
  kitapyurdu: true
  odatvkitap: false
  bkmkitap: true
  amazontr: true
  dkitap: true
  trendyol: true
  gittigidiyor: true

# Plugins
plugins: 
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-figure
  - jekyll-gist
 
# Defaults
defaults:

  # all posts
  - scope:
      path: "_posts"
    values:
      layout: post
      avatar: /assets/images/avatar.jpg
      
  # all pages
  - scope:
      path: "_pages"
    values:
      layout: page

  # all books
  - scope:
      type: "books"
      path: "_books"
    values:
      layout: book

  # all catalogs
  - scope:
      type: "catalogs"
      path: "_catalogs"
    values:
      layout: catalog

  # all slides
  - scope:
      type: "slides"
      path: "_slides"
    values:
      author: "Anonymous"
      
# Syntax
markdown: kramdown
highlighter: rouge

# XML feed
feed:
  collections:
    books:
      path: "/urunler/feed.xml"
    catalogs:
      path: "/kataloglar/feed.xml"

# excerpt
excerpt_separator: <!--more-->


# Adsense (change to "enabled" to activate, also your client id and ad slot. Create a new ad unit from your Adsense account to get the slot.)
adsense: "disabled"
adsense-data-ad-client: "ca-pub-3412143450191416"
adsense-data-ad-slot: "1363087678"

# Lazy Images ("enabled" or "disabled")
lazyimages: "enabled"

# Sass
sass:
  sass_dir: _sass
  style: compressed

collections:
  books:
    output: true
    permalink: /urunler/:title
    # sort_by: 
  catalogs:
    output: true
    permalink: /kataloglar/:title
  slides: 
    output: false
    sort_by: order

# Exclude metadata and development time dependencies (like Grunt plugins)
exclude: [README.markdown, package.json, grunt.js, Gruntfile.js, Gruntfile.coffee, node_modules]
