<!--  Replace social media links here -->
{%if site.facebook%}
<li class="nav-item p-1">
    <a class="nav-link" style="display: inline !important;" target="_blank" href="{{site.facebook}}"><span class="fab fa-facebook-square fa-2x"></span></a>
</li>
{% endif %}

{% assign x_url = site.x | default: site.twitter %}
{% if x_url %}
<li class="nav-item p-1">
    <a class="nav-link site-social__link" target="_blank" rel="noopener noreferrer" href="{{ x_url }}" aria-label="X">
        <svg class="site-social__icon site-social__icon--x" viewBox="0 0 24 24" width="28" height="28" fill="currentColor" aria-hidden="true">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
    </a>
</li>
{% endif %}

{%if site.instagram%}
<li class="nav-item p-1">
    <a class="nav-link" style="display: inline !important;" target="_blank" href="{{site.instagram}}"><span class="fab fa-instagram-square fa-2x"></span></a>
</li>
{% endif %}

{% if site.youtube %}
<li class="nav-item p-1">
    <a class="nav-link" style="display: inline !important;" target="_blank" href="{{site.youtube}}"><span class="fab fa-youtube-square fa-2x"></span></a>
</li>
{% endif %}

{% if site.telegram %}
<li class="nav-item p-1">
    <a class="nav-link" style="display: inline !important;" target="_blank" href="{{site.telegram}}"><span class="fab fa-brands fa-telegram fa-2x"></span></a>
</li>
{% endif %}
